name: CI

on:
  push:
    branches: [ track/3.1 ]
  pull_request:
    branches: [ track/3.1 ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: [airflow-api-server, airflow-scheduler, airflow-dag-processor, airflow-triggerer] 

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Run Tests
        working-directory: ${{ matrix.directory }}
        run: uv tool run tox -e unit