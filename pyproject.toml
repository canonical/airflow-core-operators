[project]
name = "airflow-core-operators"
version = "0.0.0"
requires-python = ">=3.10"
description = "Integration tests tooling for airflow-core-operators"
readme = "README.md"
dependencies = []

[dependency-groups]
integration = [
  "pytest",
  "jubilant",
  "requests",
  "PyYAML",
  "tenacity",
]

dev = [
  "ruff>=0.6",
]

[tool.pytest.ini_options]
addopts = "-p no:pytest_operator -vv -s"
testpaths = ["tests/integration"]
markers = [
    "abort_on_fail: abort test run on first failure",
]
