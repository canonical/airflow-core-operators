type: charm
name: airflow-scheduler-k8s
title: Airflow scheduler charm
summary: Monitors tasks and DAGs and triggers task instances.
description: |
  The Airflow Scheduler is part of the core Airflow components.
  It monitors all tasks and DAGs, then triggers the task instances
  following their dependencies.

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-scheduler:
    resource: airflow-scheduler-image

resources:
  airflow-scheduler-image:
    type: oci-image
    description: Airflow baseline rock.
    upstream-source: ubuntu/airflow@sha256:0a025779768549281c662b9e01589ce94e4a9d69f0ffd5040fd039104e3c0d59

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1
