type: charm
name: airflow-triggerer-k8s
title: Charm Template
summary: A charm that deploys and manages the Apache Airflow Triggerer
description: |
  The Triggerer runs an asynchronous event loop that executes trigger code and fires events back to the scheduler when conditions are met.
  This enables deferrable operators to free up worker resources while waiting.

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-triggerer:
    resource: airflow-triggerer-image

resources:
  airflow-triggerer-image:
    type: oci-image
    description: OCI image for the airflow triggerer container
    upstream-source: ubuntu/airflow:3.1-24.04_edge

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1