type: charm
name: airflow-triggerer-k8s
title: Charm Template
summary: A very short one-line summary of the charm.
description: |
  The Airflow Triggerer charm deploys and configures the Airflow Triggerer component.
  It manages the triggering and scheduling of Airflow workflows (DAGs).

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-triggerer:
    resource: airflow-triggerer-image

resources:
  airflow-triggerer-image:
    type: oci-image
    description: OCI image for the airflow triggerer container
    upstream-source: ubuntu/airflow:3.1-24.04_edge

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1