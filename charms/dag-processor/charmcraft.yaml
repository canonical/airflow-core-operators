type: charm
name: airflow-dag-processor-k8s
title: Airflow DAG Processor Charm
summary: A charm that deploys and manages the Apache Airflow DAG processor
description: |
  The DAG processor continuously scans the DAGs folder, parses Python files to discover DAG definitions.
  It also serializes the resulting DAGs so they can be used by the scheduler and stored in the metadata database.

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-dag-processor:
    resource: airflow-dag-processor-image

resources:
  airflow-dag-processor-image:
    type: oci-image
    description: OCI image for the airflow dag processor container
    upstream-source: ubuntu/airflow:3.1-24.04_edge

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1
