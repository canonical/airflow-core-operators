type: charm
name: airflow-api-server-k8s
title: Charm Template
summary: A charm that deploys and manages the Apache Airflow API server
description: |
  The API server acts as the central access point for Airflow metadata and services,
  supporting the stable REST API and serving communication between Airflow components, the UI, and external clients.
  It exposes the REST API endpoints that allow clients to programmatically interact with Airflow resources such as DAGs, runs, and task metadata.

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-api-server:
    resource: airflow-api-server-image

resources:
  airflow-api-server-image:
    type: oci-image
    description: OCI image for the airflow api server container
    upstream-source: ubuntu/airflow:3.1-24.04_edge

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1

peers:
  airflow-api-server-peers:
    interface: airflow-api-server-peers

