project: airflow-operators-collection

backends:
  lxd:
    systems:
      - ubuntu-24.04-64:
          image: ubuntu:24.04

path: /home/ubuntu/airflow-core-operators

prepare: |
  sudo apt-get update
  sudo apt-get install -y curl ca-certificates

  curl -LsSf https://astral.sh/uv/install.sh | sh
  sudo mv $HOME/.local/bin/uv $HOME/.local/bin/uvx /usr/bin/

suites:
  airflow-api-server/tests/:
    summary: Tests for Airflow API Server