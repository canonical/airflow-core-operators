type: charm
name: airflow-api-server-k8s
title: Charm Template
summary: A very short one-line summary of the charm.
description: |
  The Airflow API Server charm deploys and configures the Airflow API Server component.
  It provides a RESTful interface to manage and monitor Airflow workflows (DAGs) programmatically.

base: ubuntu@22.04
platforms:
  amd64:
  arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

containers:
  airflow-api-server:
    resource: airflow-api-server-image

resources:
  airflow-api-server-image:
    type: oci-image
    description: OCI image for the airflow api server container
    upstream-source: ubuntu/airflow:3.1-24.04_edge

requires:
  airflow-coordinator:
    interface: airflow_coordinator
    limit: 1